# CI/CD Pipeline (GitLab bridge)
#
# GitHub Actions provides the macOS runner for GitLab push and merge-request
# events forwarded through repository_dispatch. The job checks out the GitLab
# branch, runs the same local validation gate as developers, and posts the
# resulting status back to GitLab.

name: CI

on:
  repository_dispatch:
    types: [gitlab_push, gitlab_mr]

permissions:
  contents: read
  actions: read

concurrency:
  group: ci-${{ github.event.client_payload.branch }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  XCODE_VERSION: "26"
  XCODE_PROJECT: app/app.xcodeproj
  XCODE_SCHEME: BatchDilutionMixer
  XCODE_TEST_SCHEME: AppTests
  XCODE_DESTINATION: platform=iOS Simulator,name=iPhone 17 Pro
  DERIVED_DATA_PATH: ${{ github.workspace }}/build/app/xcode-derived-data

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-26
    timeout-minutes: 30
    if: |
      github.event.client_payload.event == 'merge_request' ||
      (github.event.client_payload.event == 'push' && github.event.client_payload.branch == 'main')

    steps:
      - name: Checkout from GitLab
        run: |
          git clone --depth 1 \
            --branch "${{ github.event.client_payload.branch }}" \
            "https://gitlab-token:${{ secrets.GITLAB_PAT }}@gitlab.com/${{ github.event.client_payload.project_name }}" \
            .

      - name: Resolve build profile
        run: |
          EVENT="${{ github.event.client_payload.event }}"
          BRANCH="${{ github.event.client_payload.branch }}"
          if [[ "$EVENT" == "push" && "$BRANCH" == "main" ]]; then
            BUILD_CONFIGURATION="Release"
          else
            BUILD_CONFIGURATION="Debug"
          fi
          {
            echo "CONFIGURATION=$BUILD_CONFIGURATION"
            echo "TEST_CONFIGURATION=Debug"
          } >> "$GITHUB_ENV"
          echo "Resolved build profile: event=$EVENT branch=$BRANCH CONFIGURATION=$BUILD_CONFIGURATION TEST_CONFIGURATION=Debug"

      - name: Set build metadata
        run: |
          COMMIT_HASH=$(git rev-parse --short HEAD)
          BUILD_NUMBER=${{ github.run_number }}
          MARKETING_VER=$(awk '/MARKETING_VERSION = /{gsub(/;/,""); print $NF; exit}' "$XCODE_PROJECT/project.pbxproj")
          {
            echo "BUILD_NUMBER=$BUILD_NUMBER"
            echo "GIT_COMMIT_HASH=$COMMIT_HASH"
            echo "MARKETING_VERSION=${MARKETING_VER:-unknown}"
          } >> "$GITHUB_ENV"
          echo "Version: marketing=${MARKETING_VER:-unknown} build=${BUILD_NUMBER} commit=${COMMIT_HASH}"

      - name: Restore DerivedData cache
        id: cache-derived-data
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ${{ env.DERIVED_DATA_PATH }}
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: derived-data-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-${{ env.CONFIGURATION }}-${{ env.TEST_CONFIGURATION }}-${{ github.event.client_payload.branch }}-${{ hashFiles('app/app.xcodeproj/**/*.pbxproj', 'app/app.xcodeproj/xcshareddata/xcschemes/*.xcscheme', 'app/build.sh', '.github/workflows/ci.yml') }}
          restore-keys: |
            derived-data-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-${{ env.CONFIGURATION }}-${{ github.event.client_payload.branch }}-
            derived-data-${{ runner.os }}-xcode${{ env.XCODE_VERSION }}-${{ env.CONFIGURATION }}-main-

      - name: Run local validation gate
        run: |
          DERIVED_DATA_PATH="${{ env.DERIVED_DATA_PATH }}" \
          CONFIGURATION="${{ env.CONFIGURATION }}" \
          XCODE_PROJECT="${{ env.XCODE_PROJECT }}" \
          XCODE_SCHEME="${{ env.XCODE_SCHEME }}" \
          XCODE_DESTINATION="${{ env.XCODE_DESTINATION }}" \
          app/build.sh all

      - name: Run native XCTest gate
        run: |
          set -o pipefail
          mkdir -p .build
          xcodebuild test \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_TEST_SCHEME" \
            -configuration "$TEST_CONFIGURATION" \
            -sdk iphonesimulator \
            -destination "$XCODE_DESTINATION" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -enableCodeCoverage YES \
            CODE_SIGNING_ALLOWED=NO \
            | tee .build/xcodebuild-test.log
          if grep -Ei 'warning:|Invalid Configuration' .build/xcodebuild-test.log; then
            echo "Xcode emitted warnings"
            exit 1
          fi

      - name: Save DerivedData cache
        if: always() && steps.cache-derived-data.outputs.cache-hit != 'true'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: |
            ${{ env.DERIVED_DATA_PATH }}
            ~/Library/Developer/Xcode/DerivedData/ModuleCache.noindex
          key: ${{ steps.cache-derived-data.outputs.cache-primary-key }}

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-diagnostics-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            .build/xcodebuild-test.log
            ${{ env.DERIVED_DATA_PATH }}/Logs/Test/*.xcresult
            ${{ env.DERIVED_DATA_PATH }}/Logs/Build/*.xcactivitylog
          if-no-files-found: warn
          retention-days: 14

      - name: Report coverage
        if: always()
        run: |
          XCRESULT=$(find "$DERIVED_DATA_PATH/Logs/Test" -name "*.xcresult" 2>/dev/null | head -1)
          if [[ -z "$XCRESULT" ]]; then
            echo "No .xcresult found — skipping coverage report"
            exit 0
          fi
          xcrun xccov view --report "$XCRESULT"

      - name: Post status to GitLab
        if: always()
        run: |
          STATE=$([[ "${{ job.status }}" == "success" ]] && echo "success" || echo "failed")
          curl -X POST \
            -H "PRIVATE-TOKEN: ${{ secrets.GITLAB_PAT }}" \
            "https://gitlab.com/api/v4/projects/${{ github.event.client_payload.project_id }}/statuses/${{ github.event.client_payload.sha }}" \
            -d "state=${STATE}" \
            -d "name=Build & Test" \
            -d "target_url=https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
